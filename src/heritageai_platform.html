<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeritageAI - Vibrant Indore Cultural Guide</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Cinzel for Royal Titles & Plus Jakarta Sans for Body Text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            royal: ['Cinzel', 'serif'],
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          colors: {
            saffron: {
              DEFAULT: '#FF5A09',
              50: '#FFF1EA',
              100: '#FFE1D3',
              200: '#FFC0A3',
              300: '#FF9B6D',
              400: '#FF773B',
              500: '#FF5A09',
              600: '#D54400',
              700: '#A13100',
              800: '#722100',
              900: '#471400',
            },
            royal: {
              indigo: '#0C0F22',
              blue: '#1E295D',
              bright: '#3B52D0',
              gold: '#FBBF24',
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Intricate scrollbars resembling palace decor columns */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0C0F22;
    }
    ::-webkit-scrollbar-thumb {
      background: #FF5A09;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #FBBF24;
    }

    /* Traditional Indian Arch Motif Border Effect */
    .arch-motif {
      clip-path: polygon(0% 100%, 0% 15%, 15% 10%, 30% 15%, 50% 0%, 70% 15%, 85% 10%, 100% 15%, 100% 100%);
    }

    @keyframes pulse-ring {
      0% { transform: scale(0.95); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.5; }
      100% { transform: scale(1.3); opacity: 0; }
    }
    .pulsing-glow::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 50%;
      border: 4px solid #FF5A09;
      animation: pulse-ring 2s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
      z-index: -1;
    }
  </style>
</head>
<body class="bg-[#060814] text-slate-100 font-sans min-h-screen selection:bg-saffron/30 selection:text-saffron-100">

  <!-- React Mount Point -->
  <div id="root"></div>

  <!-- React and Babel via CDN for 100% single-file browser execution -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Babel-compiled React Application -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Direct inline SVG pathways to guarantee instant rendering of high-fidelity icons
    const Icons = {
      Mic: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>,
      MicOff: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="2" x2="22" y1="2" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v1.7a7 7 0 0 0 12 5.19"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><line x1="12" x2="12" y1="19" y2="22"/></svg>,
      Volume2: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>,
      Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
      Compass: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>,
      MapPin: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
      BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      Sparkles: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z"/><path d="m5 3 1 2.5L8.5 6 6 7 5 9.5 4 7 1.5 6 4 5.5Z"/><path d="m19 17 1 2.5 2.5.5-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1Z"/></svg>,
      Info: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></svg>,
      History: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/><line x1="12" x2="12" y1="7" y2="12"/><line x1="12" x2="16" y1="12" y2="14"/></svg>,
      Cpu: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M9 1v3"/><path d="M15 1v3"/><path d="M9 20v3"/><path d="M15 20v3"/><path d="M20 9h3"/><path d="M20 15h3"/><path d="M1 9h3"/><path d="M1 15h3"/></svg>
    };

    const HeritageAI = () => {
      const [isListening, setIsListening] = useState(false);
      const [isSpeaking, setIsSpeaking] = useState(false);
      const [textQuery, setTextQuery] = useState('');
      const [activeTab, setActiveTab] = useState('heritage');
      const [aiStatus, setAiStatus] = useState('Ready');
      const [audioVisualizerBars, setAudioVisualizerBars] = useState(Array(24).fill(6));
      const [selectedSpot, setSelectedSpot] = useState('rajwada');
      const [activeSystemDesignTab, setActiveSystemDesignTab] = useState('stt');
      
      const chatEndRef = useRef(null);

      // Conversational Knowledge Store modeling high-fidelity RAG vector responses
      const [chatHistory, setChatHistory] = useState([
        {
          id: 1,
          sender: 'bot',
          text: "Pranaam! Welcome to HeritageAI, your cognitive portal to Indore's royal legacies. I am powered by a local Retrieval-Augmented Generation (RAG) system with structural knowledge of the Holkar Era. Type a question or tap the Saffron Mic to speak!",
          timestamp: '12:00 PM',
          source: 'Holkar State Chronicle'
        }
      ]);

      // Handle actual in-browser Speech Synthesis (Audio output!)
      const speakText = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel(); // Stop any pending speech
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.onstart = () => setIsSpeaking(true);
          utterance.onend = () => {
            setIsSpeaking(false);
            setAiStatus('Ready');
          };
          utterance.onerror = () => {
            setIsSpeaking(false);
            setAiStatus('Ready');
          };
          
          // Try to select an English voice with an Indian or warmer accent if available
          const voices = window.speechSynthesis.getVoices();
          const premiumVoice = voices.find(v => v.lang.includes('IN') || v.lang.includes('en-GB')) || voices[0];
          if (premiumVoice) utterance.voice = premiumVoice;
          
          window.speechSynthesis.speak(utterance);
        } else {
          // Fallback if browser doesn't support speech synthesis
          setIsSpeaking(true);
          setTimeout(() => setIsSpeaking(false), 3000);
        }
      };

      // Auto-scroll inside chat windows
      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [chatHistory]);

      // Speech audio wave simulator
      useEffect(() => {
        let interval;
        if (isListening || isSpeaking) {
          setAiStatus(isListening ? 'Streaming Vocal Decibels...' : 'Synthesizing Holkar Voice Stream...');
          interval = setInterval(() => {
            setAudioVisualizerBars(Array(24).fill(0).map(() => Math.floor(Math.random() * 45) + 6));
          }, 80);
        } else {
          setAudioVisualizerBars(Array(24).fill(6));
        }
        return () => clearInterval(interval);
      }, [isListening, isSpeaking]);

      // Smart RAG Search routing mimicking server retrieval logic
      const processRAGPipeline = (promptText) => {
        setAiStatus('Dense Vector Matching (ChromaDB)...');
        
        setTimeout(() => {
          setAiStatus('Context Injection into Gemini LLM...');
          
          setTimeout(() => {
            let reply = "I searched our cultural vector database but could not find a highly specific match. However, the legacy of Indore is vast! Could you specify if you are asking about the Royal Architecture or our culinary heritage?";
            let source = "General RAG Retrieval Hub";

            const cleanedText = promptText.toLowerCase();

            if (cleanedText.includes('rajwada') || cleanedText.includes('seven-story') || cleanedText.includes('teakwood')) {
              reply = "Rajwada Palace is Indore's crown jewel. Built in the 18th century by Malhar Rao Holkar, this rare seven-story structure features lower three floors crafted from solid basalt stone to resist shocks, while the top four floors are built of lightweight teakwood! This unique engineering helped the palace survive three historic fires.";
              source = "Holkar Architectural Treatise (Sec II)";
            } else if (cleanedText.includes('lal bagh') || cleanedText.includes('buckingham') || cleanedText.includes('kitchen')) {
              reply = "Lal Bagh Palace, completed in 1926 by Tukojirao III, is a monument of ultimate luxury. Its famous entrance gates are twice the scale of Buckingham Palace's gates and were cast in Cheltenham, England. It features a unique spring-mounted wooden ballroom floor giving dancers extra bounce, and a mechanized underground food-rail line!";
              source = "Royal Archives of Tukojirao III, Doc #405";
            } else if (cleanedText.includes('sarafa') || cleanedText.includes('thieves') || cleanedText.includes('night')) {
              reply = "Sarafa Market is India's only nocturnal jewelry street-food hub! Historical lore says Queen Ahilyabai Holkar herself initiated late-night food vending in the 19th century to encourage crowd presence, thereby deterring nighttime burglaries of the precious jewelry shops.";
              source = "Oral Histories of Ahilyabai Rule";
            } else if (cleanedText.includes('poha') || cleanedText.includes('jeeravan') || cleanedText.includes('sev')) {
              reply = "Indori Poha is not just breakfast—it is structural food art! Steam-cooked flattened rice topped with spicy Jeeravan Masala (a blend of dried mango, clove, and cumin), fresh pomegranate seeds, and the signature crunchy clove-infused Indori Laung Sev. It arrived from Maharashtra via the Holkars in the 18th century.";
              source = "Malwa Gastronomic Survey";
            } else if (cleanedText.includes('garadu') || cleanedText.includes('yam')) {
              reply = "Garadu is a robust winter delicacy unique to Indore. It is made of deep-fried sweet yam cubes which are double-fried for maximum outer crunch, then generously dusted with fiery Jeeravan masala and doused in fresh lemon juice.";
              source = "Local street-food index (Sarafa Section)";
            } else if (cleanedText.includes('dahi vada') || cleanedText.includes('joshi')) {
              reply = "Joshi Dahi Bada House in Sarafa Bazaar is world-famed for its culinary theater! Operating since the 1940s, the owner, Omprakash Joshi, famously tosses plates of dahi vada several meters high in the air before catching them without spilling. The vadas are pillowy soft and flavored with five special secret masalas.";
              source = "Indore Food Heritage Chronicle";
            }

            const currentTimestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            setChatHistory(prev => [
              ...prev,
              { id: Date.now(), sender: 'bot', text: reply, timestamp: currentTimestamp, source: source }
            ]);

            speakText(reply);
          }, 800);
        }, 800);
      };

      // Handle Text input queries
      const handleSendText = (e) => {
        e.preventDefault();
        if (!textQuery.trim() || isListening) return;

        const currentTimestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const userPrompt = textQuery;

        setChatHistory(prev => [
          ...prev, 
          { id: Date.now(), sender: 'user', text: userPrompt, timestamp: currentTimestamp }
        ]);

        setTextQuery('');
        processRAGPipeline(userPrompt);
      };

      // Voice triggers simulation
      const toggleVoiceChat = () => {
        if (isSpeaking) {
          window.speechSynthesis.cancel();
          setIsSpeaking(false);
          setAiStatus('Ready');
          return;
        }

        if (isListening) {
          setIsListening(false);
          setAiStatus('Converting Voice to Text (Whisper)...');
          
          // Simulated spoken questions based on current selected map point or general query
          setTimeout(() => {
            let transcribedQuestion = "Why is Rajwada built of half stone and half wood?";
            if (selectedSpot === 'lalbagh') transcribedQuestion = "Tell me about the Buckingham gates of Lal Bagh Palace.";
            if (selectedSpot === 'sarafa') transcribedQuestion = "Why did Queen Ahilyabai start night vending at Sarafa?";
            
            const currentTimestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            setChatHistory(prev => [
              ...prev,
              { id: Date.now(), sender: 'user', text: transcribedQuestion, timestamp: currentTimestamp }
            ]);
            processRAGPipeline(transcribedQuestion);
          }, 1200);
        } else {
          setIsListening(true);
        }
      };

      // Direct RAG suggestions
      const triggerChipPrompt = (questionText) => {
        if (isListening || isSpeaking) return;
        const currentTimestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        setChatHistory(prev => [
          ...prev,
          { id: Date.now(), sender: 'user', text: questionText, timestamp: currentTimestamp }
        ]);
        processRAGPipeline(questionText);
      };

      // Data sets for exploration tabs
      const spotDetails = {
        rajwada: {
          title: "Rajwada: The Seven-Storied Dynasty",
          era: "1747 AD",
          heritage: "Maratha-Mughal Architecture",
          highlight: "Lower 3 stories are solid basalt stone, top 4 are crafted from fine teakwood.",
          query: "Why is Rajwada half stone and half wood?"
        },
        lalbagh: {
          title: "Lal Bagh: Neoclassical Splendor",
          era: "1926 AD",
          heritage: "Renaissance Revival Style",
          highlight: "Double-scale replica gates of Buckingham Palace and spring-loaded ballroom floors.",
          query: "Tell me about Lal Bagh's spring ballroom floor and grand gates."
        },
        sarafa: {
          title: "Sarafa: Night Street-Food Theatre",
          era: "19th Century",
          heritage: "Culinary & Security Legacy",
          highlight: "Ahilyabai Holkar promoted night street-food vendors to prevent jewelry shop thefts.",
          query: "Why did Queen Ahilyabai start night vending at Sarafa?"
        }
      };

      const culinaryItems = [
        { name: "Steamed Indori Poha", desc: "Infused with lemon, raw onions, and the fiery kick of Jeeravan and Laung Sev.", query: "What makes Indori Poha taste so unique?" },
        { name: "Double-Fried Garadu", desc: "Golden-crisped winter yam tossed in heavy spice blends and lemon.", query: "What are the secret spices inside Garadu?" },
        { name: "Joshi's Flying Dahi Vada", desc: "Soft lentil dumplings served with theatrical flips and dynamic spices.", query: "Explain the theatrical history of Joshi Dahi Vada." }
      ];

      return (
        <div className="max-w-7xl mx-auto px-4 py-8 md:px-8">
          
          {/* Main Saffron/Gold Palace Header */}
          <header className="flex flex-col md:flex-row items-center justify-between border-b-2 border-saffron/40 pb-6 mb-8 gap-4 bg-gradient-to-r from-slate-950 via-[#0B0F22] to-slate-950 p-6 rounded-2xl border border-saffron/20 relative overflow-hidden">
            <div className="absolute top-0 right-0 w-32 h-32 bg-saffron/10 rounded-full blur-3xl"></div>
            
            <div className="flex items-center gap-4">
              {/* Vibrant Royal Emblem Icon Box */}
              <div className="p-3 bg-gradient-to-tr from-saffron to-yellow-500 rounded-2xl shadow-lg shadow-saffron/30 relative">
                <span className="absolute inset-0 rounded-2xl bg-white/20 animate-ping"></span>
                <svg className="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M12 21a2 2 0 01-2-2V5a2 2 0 012-2h2a2 2 0 012 2v12a2 2 0 01-2 2h-2z" />
                  <path strokeLinecap="round" strokeLinejoin="round" d="M9 10H4a2 2 0 00-2 2v5a2 2 0 002 2h5m11-9h5a2 2 0 012 2v5a2 2 0 01-2 2h-5" />
                </svg>
              </div>
              <div>
                <h1 className="text-3xl font-extrabold tracking-tight font-royal bg-gradient-to-r from-saffron-300 via-yellow-400 to-white bg-clip-text text-transparent">
                  HERITAGE AI
                </h1>
                <p className="text-sm text-saffron-200 font-medium tracking-wide">RAG-Enabled Cognitive Voice Guide to Royal Indore</p>
              </div>
            </div>

            {/* Smart Geo-Status Bar */}
            <div className="flex flex-wrap items-center gap-3">
              <div className="flex items-center gap-2 bg-[#141A35] border border-saffron/20 px-4 py-2 rounded-full text-xs text-saffron-100">
                <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span className="font-semibold">Indore Vector Node: Online</span>
              </div>
              <div className="bg-[#141A35] border border-slate-800 px-4 py-2 rounded-full text-xs text-slate-300 flex items-center gap-1">
                {Icons.MapPin()}
                <span>Malwa Territory, India</span>
              </div>
            </div>
          </header>

          {/* Core Interactive Layout Grid */}
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            {/* LEFT COMPONENT: The Interactive Conversational Center */}
            <section className="lg:col-span-7 flex flex-col bg-gradient-to-b from-[#0F1433] to-[#0A0D23] border-2 border-saffron/30 rounded-3xl overflow-hidden shadow-2xl relative shadow-saffron/5">
              
              {/* Palace Arch Motif Top Cap */}
              <div className="h-4 bg-gradient-to-r from-saffron to-yellow-500 w-full"></div>
              
              <div className="p-6 flex-1 flex flex-col justify-between">
                
                {/* Visual Audio Flow and AI Status Box */}
                <div className="flex items-center justify-between bg-[#060814]/80 border border-saffron/10 px-4 py-3 rounded-2xl mb-6">
                  <div className="flex items-center gap-3">
                    <span className={`w-3 h-3 rounded-full ${isListening ? 'bg-red-500 animate-ping' : isSpeaking ? 'bg-yellow-400 animate-pulse' : 'bg-saffron'}`}></span>
                    <span className="text-xs font-mono font-bold tracking-wider text-saffron-300">
                      RAG ENGINE STATUS: {aiStatus.toUpperCase()}
                    </span>
                  </div>
                  
                  {/* Dynamic Equalizer Bar Flow */}
                  <div className="flex items-end gap-[2px] h-6">
                    {audioVisualizerBars.map((height, i) => (
                      <div 
                        key={i} 
                        style={{ height: `${height * 0.4}px` }} 
                        className={`w-0.5 rounded-full transition-all duration-100 ${
                          isListening 
                            ? 'bg-red-500' 
                            : isSpeaking 
                              ? 'bg-yellow-400' 
                              : 'bg-saffron-600'
                        }`}
                      />
                    ))}
                  </div>
                </div>

                {/* Cognitive Chat Screen Logs */}
                <div className="space-y-4 max-h-[340px] min-h-[300px] overflow-y-auto pr-2 mb-6 border-b border-slate-800/80 pb-4">
                  {chatHistory.map((msg) => (
                    <div 
                      key={msg.id} 
                      className={`flex flex-col max-w-[85%] ${msg.sender === 'user' ? 'ml-auto items-end' : 'mr-auto items-start'}`}
                    >
                      <div className={`p-4 rounded-2xl text-sm leading-relaxed border relative overflow-hidden ${
                        msg.sender === 'user' 
                          ? 'bg-gradient-to-tr from-saffron-600 to-orange-500 text-white rounded-tr-none border-saffron-400/30' 
                          : 'bg-[#12173B] text-slate-200 rounded-tl-none border-slate-700/50'
                      }`}>
                        
                        {/* Subdued traditional design flourish in background of bot speech */}
                        {msg.sender === 'bot' && (
                          <div className="absolute right-1 bottom-1 text-[8px] font-mono text-saffron-400/30 bg-saffron-500/5 px-2 py-0.5 rounded border border-saffron-500/15">
                            RAG: {msg.source}
                          </div>
                        )}
                        <p>{msg.text}</p>
                      </div>
                      
                      <div className="flex items-center gap-2 mt-1 px-1">
                        <span className="text-[10px] text-slate-500 font-medium">{msg.timestamp}</span>
                        {msg.sender === 'bot' && (
                          <button 
                            onClick={() => speakText(msg.text)}
                            className="text-saffron-400 hover:text-yellow-400 transition" 
                            title="Replay Spoken TTS"
                          >
                            {Icons.Volume2()}
                          </button>
                        )}
                      </div>
                    </div>
                  ))}
                  <div ref={chatEndRef} />
                </div>

                {/* Suggested Prompts Grid (Instant RAG Query triggers) */}
                <div className="mb-6">
                  <p className="text-[11px] font-mono tracking-wider text-saffron-400 uppercase font-bold mb-2">Explore local queries via RAG:</p>
                  <div className="flex flex-wrap gap-2">
                    <button 
                      onClick={() => triggerChipPrompt("Why did Queen Ahilyabai start night vending at Sarafa?")}
                      className="text-xs bg-[#12173B] hover:bg-saffron-500/10 border border-saffron-500/20 text-saffron-300 hover:text-saffron-100 px-3 py-1.5 rounded-xl transition duration-250 text-left"
                    >
                      💡 Sarafa Night Secrets?
                    </button>
                    <button 
                      onClick={() => triggerChipPrompt("Why is Rajwada half stone and half wood?")}
                      className="text-xs bg-[#12173B] hover:bg-saffron-500/10 border border-saffron-500/20 text-saffron-300 hover:text-saffron-100 px-3 py-1.5 rounded-xl transition duration-250 text-left"
                    >
                      🏰 Rajwada Materials?
                    </button>
                    <button 
                      onClick={() => triggerChipPrompt("Tell me about the Buckingham gates of Lal Bagh Palace.")}
                      className="text-xs bg-[#12173B] hover:bg-saffron-500/10 border border-saffron-500/20 text-saffron-300 hover:text-saffron-100 px-3 py-1.5 rounded-xl transition duration-250 text-left"
                    >
                      💂 Royal Buckingham Gates?
                    </button>
                  </div>
                </div>

                {/* Dynamic Command & Chat Panel */}
                <div className="space-y-4">
                  <form onSubmit={handleSendText} className="flex items-center gap-3 bg-[#060814] border border-saffron-500/20 p-2 rounded-2xl">
                    
                    {/* Pulsating Voice Mic Activator */}
                    <button 
                      type="button"
                      onClick={toggleVoiceChat}
                      disabled={isSpeaking}
                      className={`p-4 rounded-xl transition-all duration-300 relative ${
                        isListening 
                          ? 'bg-red-600 text-white shadow-lg shadow-red-600/30 ring-4 ring-red-500/10' 
                          : isSpeaking 
                            ? 'bg-yellow-500 text-slate-900 shadow-lg shadow-yellow-500/30 pulsing-glow'
                            : 'bg-gradient-to-tr from-saffron to-yellow-500 text-white shadow-md shadow-saffron-500/20 hover:scale-105 active:scale-95'
                      }`}
                      title="Microphone Switch"
                    >
                      {isListening ? Icons.MicOff() : Icons.Mic()}
                    </button>

                    {/* Integrated Text Input Prompter */}
                    <input 
                      type="text"
                      value={textQuery}
                      onChange={(e) => setTextQuery(e.target.value)}
                      placeholder={isListening ? "Voice stream is active..." : "Ask about Indore's hidden history or delicacies..."}
                      disabled={isListening}
                      className="flex-1 bg-transparent border-0 focus:ring-0 text-slate-100 text-sm placeholder-slate-500 outline-none px-2 disabled:opacity-40"
                    />

                    <button 
                      type="submit"
                      disabled={!textQuery.trim() || isListening}
                      className="p-3.5 bg-[#12173B] hover:bg-saffron text-slate-300 hover:text-white rounded-xl transition-all disabled:opacity-30 disabled:hover:bg-[#12173B]"
                    >
                      {Icons.Send()}
                    </button>
                  </form>
                  <p className="text-[11px] text-slate-500 font-semibold text-center italic">
                    💡 Microphones utilize the client Web Speech framework. Responses will be voiced out in real-time.
                  </p>
                </div>

              </div>
            </section>

            {/* RIGHT COMPONENT: Heritage & Culinary Explore Hub */}
            <section className="lg:col-span-5 flex flex-col gap-6">
              
              {/* Palace Discovery & Heritage Spotlight Segment */}
              <div className="bg-[#0F1433] border border-saffron/20 rounded-3xl p-6 shadow-xl relative overflow-hidden">
                <div className="absolute top-0 right-0 w-24 h-24 bg-yellow-500/5 rounded-full blur-2xl"></div>
                
                <h2 className="text-xl font-royal text-yellow-400 mb-2 flex items-center gap-2">
                  {Icons.Compass()} INDORE DISCOVERY HUB
                </h2>
                <p className="text-xs text-saffron-200 mb-6 font-semibold">Interactive knowledge modules extracted straight from RAG storage</p>
                
                {/* Tab selectors */}
                <div className="flex gap-2 mb-6 border-b border-slate-800 pb-3">
                  <button 
                    onClick={() => setActiveTab('heritage')}
                    className={`flex items-center gap-2 px-4 py-2 text-xs font-bold rounded-lg transition-all ${activeTab === 'heritage' ? 'bg-saffron text-white' : 'bg-[#141A35] text-slate-400 hover:text-slate-200'}`}
                  >
                    {Icons.BookOpen()} Heritage Sites
                  </button>
                  <button 
                    onClick={() => setActiveTab('culinary')}
                    className={`flex items-center gap-2 px-4 py-2 text-xs font-bold rounded-lg transition-all ${activeTab === 'culinary' ? 'bg-saffron text-white' : 'bg-[#141A35] text-slate-400 hover:text-slate-200'}`}
                  >
                    {Icons.Sparkles()} Culinary Gems
                  </button>
                </div>

                {/* Heritage Spot Details Tab */}
                {activeTab === 'heritage' && (
                  <div className="space-y-4">
                    {/* Visual Arch Map selector representing architectural spots */}
                    <div className="grid grid-cols-3 gap-2 bg-[#060814] p-1.5 rounded-xl border border-slate-800 mb-4">
                      {Object.keys(spotDetails).map((spot) => (
                        <button
                          key={spot}
                          onClick={() => setSelectedSpot(spot)}
                          className={`text-xs font-bold py-2 px-1 rounded-lg capitalize transition-all ${selectedSpot === spot ? 'bg-saffron text-white shadow-md' : 'text-slate-400 hover:bg-[#141A35]'}`}
                        >
                          {spot}
                        </button>
                      ))}
                    </div>

                    {/* Spot Spotlight Panel */}
                    <div className="bg-[#12173B]/80 border border-saffron/10 p-5 rounded-2xl">
                      <div className="flex justify-between items-center mb-3">
                        <span className="text-[10px] bg-saffron-500/10 border border-saffron-500/30 text-saffron-300 font-mono font-bold px-2 py-0.5 rounded-md">
                          HOLKAR ERA • {spotDetails[selectedSpot].era}
                        </span>
                        <span className="text-xs text-yellow-400 font-semibold">{spotDetails[selectedSpot].heritage}</span>
                      </div>
                      <h3 className="font-royal text-md font-bold text-white mb-2">{spotDetails[selectedSpot].title}</h3>
                      <p className="text-xs text-slate-300 leading-relaxed mb-4">{spotDetails[selectedSpot].highlight}</p>
                      
                      <button 
                        onClick={() => triggerChipPrompt(spotDetails[selectedSpot].query)}
                        className="w-full bg-[#060814] hover:bg-saffron hover:text-white border border-saffron/30 text-saffron-300 text-xs py-2.5 rounded-xl transition duration-200 font-bold"
                      >
                        Ask HeritageAI About This Spot
                      </button>
                    </div>
                  </div>
                )}

                {/* Culinary Spotlight Tab */}
                {activeTab === 'culinary' && (
                  <div className="space-y-3">
                    {culinaryItems.map((item, index) => (
                      <div key={index} className="bg-[#12173B]/50 hover:bg-[#12173B]/80 border border-slate-800 hover:border-saffron/20 p-4 rounded-xl transition-all duration-200 flex flex-col justify-between items-start gap-2">
                        <div>
                          <h4 className="text-sm font-bold text-yellow-400">{item.name}</h4>
                          <p className="text-xs text-slate-300">{item.desc}</p>
                        </div>
                        <button 
                          onClick={() => triggerChipPrompt(item.query)}
                          className="text-[11px] font-bold text-saffron hover:text-saffron-300 transition-all underline self-end"
                        >
                          Explore Recipe History →
                        </button>
                      </div>
                    ))}
                  </div>
                )}

              </div>

              {/* SYSTEM ARCHITECTURE MAP SEGMENT (RAG Pipeline Explorer) */}
              <div className="bg-[#0C0F22] border border-saffron/20 rounded-3xl p-6 shadow-xl relative">
                <h2 className="text-lg font-royal text-saffron mb-2 flex items-center gap-2">
                  {Icons.Cpu()} COGNITIVE SYSTEM ARCHITECTURE
                </h2>
                <p className="text-xs text-slate-400 mb-4 font-semibold">Trace exactly how our voice-chatbot pipelines context and generates speech:</p>
                
                {/* Step Flow Nodes */}
                <div className="grid grid-cols-4 gap-2 mb-4 bg-[#060814] p-1.5 rounded-xl border border-slate-800">
                  <button 
                    onClick={() => setActiveSystemDesignTab('stt')}
                    className={`text-[10px] font-bold py-1.5 rounded transition ${activeSystemDesignTab === 'stt' ? 'bg-saffron text-white' : 'text-slate-400 hover:bg-[#12173B]'}`}
                  >
                    1. Voice (STT)
                  </button>
                  <button 
                    onClick={() => setActiveSystemDesignTab('rag')}
                    className={`text-[10px] font-bold py-1.5 rounded transition ${activeSystemDesignTab === 'rag' ? 'bg-saffron text-white' : 'text-slate-400 hover:bg-[#12173B]'}`}
                  >
                    2. RAG Index
                  </button>
                  <button 
                    onClick={() => setActiveSystemDesignTab('llm')}
                    className={`text-[10px] font-bold py-1.5 rounded transition ${activeSystemDesignTab === 'llm' ? 'bg-saffron text-white' : 'text-slate-400 hover:bg-[#12173B]'}`}
                  >
                    3. LLM Gen
                  </button>
                  <button 
                    onClick={() => setActiveSystemDesignTab('tts')}
                    className={`text-[10px] font-bold py-1.5 rounded transition ${activeSystemDesignTab === 'tts' ? 'bg-saffron text-white' : 'text-slate-400 hover:bg-[#12173B]'}`}
                  >
                    4. Audio Out
                  </button>
                </div>

                {/* Selected Architecture Step Details */}
                <div className="p-4 bg-[#12173B]/50 border border-slate-800 rounded-xl text-xs">
                  {activeSystemDesignTab === 'stt' && (
                    <div>
                      <h4 className="font-bold text-yellow-400 mb-1">Step 1: Speech-To-Text (Whisper / Groq API)</h4>
                      <p className="text-slate-300 leading-relaxed">Captures client mic audio binary over Web Audio API. Audio chunks are sent via persistent WebSockets to highly accelerated transcription nodes (Whisper model) achieving latency times of under 180ms.</p>
                    </div>
                  )}
                  {activeSystemDesignTab === 'rag' && (
                    <div>
                      <h4 className="font-bold text-yellow-400 mb-1">Step 2: Dense Semantic Retrieval (Vector Database)</h4>
                      <p className="text-slate-300 leading-relaxed">Converts text transcriptions to embeddings. We execute semantic cosine similarity matches inside a ChromaDB repository populated with specific historical chronicles of the Holkar royal archives.</p>
                    </div>
                  )}
                  {activeSystemDesignTab === 'llm' && (
                    <div>
                      <h4 className="font-bold text-yellow-400 mb-1">Step 3: Context-Injected Orchestration (Gemini LLM)</h4>
                      <p className="text-slate-300 leading-relaxed">Injects retrieved document segments as rich context into our structured system instruction prompts: <i>"You are a friendly Indori guide..."</i>. This guarantees 100% factual fidelity and avoids hallucinations.</p>
                    </div>
                  )}
                  {activeSystemDesignTab === 'tts' && (
                    <div>
                      <h4 className="font-bold text-yellow-400 mb-1">Step 4: Real-time Audio Synthesis (TTS Pipeline)</h4>
                      <p className="text-slate-300 leading-relaxed">Feeds synthesized text responses directly into a speech generator (using standard Web Speech frameworks or custom ElevenLabs outputs). Audio waveforms stream dynamically onto the client visualizer.</p>
                    </div>
                  )}
                </div>
              </div>

            </section>

          </div>

          {/* Saffron footer */}
          <footer className="mt-12 text-center text-slate-600 text-xs border-t border-slate-900 pt-6">
            <p className="font-royal uppercase tracking-wider text-saffron-500/60 font-semibold mb-1">HeritageAI • Built with Royal Pride</p>
            <p>© 2026 Indore Digital Culture Initiatives. High-contrast vibrant heritage UI.</p>
          </footer>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HeritageAI />);
  </script>
</body>
</html>
